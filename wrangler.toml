name = "global-holiday-calendar"
main = "worker/index.js"
compatibility_date = "2024-09-23"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "holiday.orangely.xyz", custom_domain = true },
  { pattern = "holidays.orangely.xyz", custom_domain = true }
]

[assets]
directory = "./dist"
binding = "ASSETS"

[vars]
# Non-secret environment variables can go here

# Secrets (set via: wrangler secret put <KEY_NAME>)
# GEMINI_API_KEY        - Gemini API key (primary AI provider)
# ZHIPU_API_KEY         - BigModel API key (fallback AI provider)
# CALENDARIFIC_API_KEY  - Calendarific API key (optional, extra holiday data)
